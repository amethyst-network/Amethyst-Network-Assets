<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0"
    />
    <title>Feed the Void</title>
    <style>
      html,
      body,
      #canvas {
        margin: 0;
        padding: 0;
        border: 0;
      }

      body {
        color: white;
        background-color: black;
        overflow: hidden;
        touch-action: none;
      }

      #canvas {
        display: block;
      }

      #canvas:focus {
        outline: none;
      }

      #status,
      #status-splash,
      #status-progress {
        position: absolute;
        left: 0;
        right: 0;
      }

      #status,
      #status-splash {
        top: 0;
        bottom: 0;
      }

      #status {
        background-color: #242424;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        visibility: hidden;
      }

      #status-splash {
        max-height: 100%;
        max-width: 100%;
        margin: auto;
      }

      #status-splash.show-image--false {
        display: none;
      }

      #status-splash.fullsize--true {
        height: 100%;
        width: 100%;
        object-fit: contain;
      }

      #status-splash.use-filter--false {
        image-rendering: pixelated;
      }

      #status-progress,
      #status-notice {
        display: none;
      }

      #status-progress {
        bottom: 10%;
        width: 50%;
        margin: 0 auto;
      }

      #status-notice {
        background-color: #5b3943;
        border-radius: 0.5rem;
        border: 1px solid #9b3943;
        color: #e0e0e0;
        font-family: "Noto Sans", "Droid Sans", Arial, sans-serif;
        line-height: 1.3;
        margin: 0 2rem;
        overflow: hidden;
        padding: 1rem;
        text-align: center;
        z-index: 1;
      }
    </style>
    <link
      id="-gd-engine-icon"
      rel="icon"
      type="image/png"
      href="index.icon.png"
    />
    <link rel="apple-touch-icon" href="index.apple-touch-icon.png" />
    <script>
      function getFile(callback) {
        window.input = document.createElement("input");
        input.type = "file";
        input.onchange = (e) => {
          var file = e.target.files[0];
          var reader = new FileReader();
          reader.readAsBinaryString(file);
          reader.onload = (readerEvent) => {
            callback(readerEvent.target.result);
          };
        };
      }
    </script>
  </head>
  <body>
    <canvas id="canvas"> Your browser does not support the canvas tag. </canvas>

    <noscript> Your browser does not support JavaScript. </noscript>

    <div id="status">
      <img
        id="status-splash"
        class="show-image--true fullsize--true use-filter--true"
        src="index.png"
        alt=""
      />
      <progress id="status-progress"></progress>
      <div id="status-notice"></div>
    </div>

    <script src="index.js"></script>
    <script>
      const originalFetch = window.fetch;

      function mergeFiles(fileParts) {
        return new Promise((resolve, reject) => {
          let buffers = [];

          function fetchPart(index) {
            if (index >= fileParts.length) {
              let mergedBlob = new Blob(buffers);
              let mergedFileUrl = URL.createObjectURL(mergedBlob);
              resolve(mergedFileUrl);
              return;
            }
            fetch(fileParts[index])
              .then((response) => {
                if (!response.ok)
                  throw new Error("Missing part: " + fileParts[index]);
                return response.arrayBuffer();
              })
              .then((data) => {
                buffers.push(data);
                fetchPart(index + 1);
              })
              .catch(reject);
          }
          fetchPart(0);
        });
      }

      function getParts(file, start, end) {
        let parts = [];
        for (let i = start; i <= end; i++) {
          parts.push(file + ".part" + i);
        }
        return parts;
      }
      Promise.all([mergeFiles(getParts("index.wasm", 1, 2))]).then(
        ([wasmUrl]) => {
          window.fetch = async function (url, ...args) {
            if (url.endsWith("index.wasm")) {
              return originalFetch(wasmUrl, ...args);
            } else {
              return originalFetch(url, ...args);
            }
          };

          const script = document.createElement("script");
          script.src = "init.js";
          document.body.appendChild(script);
        },
      );
    </script>
    <script></script>
  </body>
</html>
