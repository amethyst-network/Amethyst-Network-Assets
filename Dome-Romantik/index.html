<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="" xml:lang="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <link id="-gd-engine-icon" rel="icon" type="image/png" href="favicon.png" />
    <title>Dome Romantik</title>
    <style type="text/css">
      body {
        touch-action: none;
        margin: 0;
        border: 0 none;
        padding: 0;
        text-align: center;
        background-color: black;
      }

      #canvas {
        display: block;
        margin: 0;
        color: white;
      }

      #canvas:focus {
        outline: none;
      }

      .godot {
        font-family: "Noto Sans", "Droid Sans", Arial, sans-serif;
        color: #e0e0e0;
        background-color: #3b3943;
        background-image: linear-gradient(to bottom, #403e48, #35333c);
        border: 1px solid #45434e;
        box-shadow: 0 0 1px 1px #2f2d35;
      }

      /* Status display
		 * ============== */

      #status {
        position: absolute;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        /* don't consume click events - make children visible explicitly */
        visibility: hidden;
      }

      #status-progress {
        width: 366px;
        height: 7px;
        background-color: #38363a;
        border: 1px solid #444246;
        padding: 1px;
        box-shadow: 0 0 2px 1px #1b1c22;
        border-radius: 2px;
        visibility: visible;
      }

      @media only screen and (orientation: portrait) {
        #status-progress {
          width: 61.8%;
        }
      }

      #status-progress-inner {
        height: 100%;
        width: 0;
        box-sizing: border-box;
        transition: width 0.5s linear;
        background-color: #202020;
        border: 1px solid #222223;
        box-shadow: 0 0 1px 1px #27282e;
        border-radius: 3px;
      }

      #status-indeterminate {
        visibility: visible;
        position: relative;
      }

      #status-indeterminate > div {
        width: 4.5px;
        height: 0;
        border-style: solid;
        border-width: 9px 3px 0 3px;
        border-color: #2b2b2b transparent transparent transparent;
        transform-origin: center 21px;
        position: absolute;
      }

      #status-indeterminate > div:nth-child(1) {
        transform: rotate(22.5deg);
      }
      #status-indeterminate > div:nth-child(2) {
        transform: rotate(67.5deg);
      }
      #status-indeterminate > div:nth-child(3) {
        transform: rotate(112.5deg);
      }
      #status-indeterminate > div:nth-child(4) {
        transform: rotate(157.5deg);
      }
      #status-indeterminate > div:nth-child(5) {
        transform: rotate(202.5deg);
      }
      #status-indeterminate > div:nth-child(6) {
        transform: rotate(247.5deg);
      }
      #status-indeterminate > div:nth-child(7) {
        transform: rotate(292.5deg);
      }
      #status-indeterminate > div:nth-child(8) {
        transform: rotate(337.5deg);
      }

      #status-notice {
        margin: 0 100px;
        line-height: 1.3;
        visibility: visible;
        padding: 4px 6px;
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas">
      HTML5 canvas appears to be unsupported in the current browser.<br />
      Please try updating or use a different browser.
    </canvas>
    <div id="status">
      <div
        id="status-progress"
        style="display: none"
        oncontextmenu="event.preventDefault()"
      >
        <div id="status-progress-inner"></div>
      </div>
      <div
        id="status-indeterminate"
        style="display: none"
        oncontextmenu="event.preventDefault()"
      >
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
      <div id="status-notice" class="godot" style="display: none"></div>
    </div>

    <script type="text/javascript" src="index.js"></script>
    <script>
      const originalFetch = window.fetch;

      let pckUrl = null;
      let wasmUrl = null;

      function mergeFilesWithProgress(base, count, onProgress) {
        let loaded = 0;

        const requests = [];
        if (count === 1) {
          requests.push(
            fetch(base).then(async (r) => {
              if (!r.ok) throw new Error("Missing part: " + base + ".part" + i);
              const buf = await r.arrayBuffer();
              loaded++;
              onProgress(loaded, count);
              return buf;
            }),
          );
        } else {
          for (let i = 1; i <= count; i++) {
            requests.push(
              fetch(base + ".part" + i).then(async (r) => {
                if (!r.ok)
                  throw new Error("Missing part: " + base + ".part" + i);
                const buf = await r.arrayBuffer();
                loaded++;
                onProgress(loaded, count);
                return buf;
              }),
            );
          }
        }

        return Promise.all(requests).then((buffers) => {
          return URL.createObjectURL(new Blob(buffers));
        });
      }

      (async () => {
        const statusProgress = document.getElementById("status-progress");
        const statusProgressInner = document.getElementById(
          "status-progress-inner",
        );
        const statusIndeterminate = document.getElementById(
          "status-indeterminate",
        );

        statusProgress.style.display = "block";
        statusProgress.style.position = "absolute";
        statusProgress.style.margin = "0 auto";
        statusIndeterminate.style.display = "none";

        const logo = document.createElement("img");
        logo.src = "https://amethyst-network.org/brandAssets/logow.png";
        logo.style.width = "200px";
        logo.style.marginBottom = "20px";
        logo.style.display = "block";
        logo.style.marginLeft = "auto";
        logo.style.marginRight = "auto";

        document.getElementById("status").prepend(logo);

        let totalParts = 8 + 2;
        let completedParts = 0;

        function updateProgress() {
          const percent = (completedParts / totalParts) * 100;
          statusProgressInner.style.width = percent + "%";
        }

        pckUrl = await mergeFilesWithProgress("index.pck", 2, () => {
          completedParts++;
          updateProgress();
        });

        wasmUrl = await mergeFilesWithProgress("index.wasm", 1, () => {
          completedParts++;
          updateProgress();
        });

        window.fetch = async function (url, ...args) {
          if (url.endsWith("index.pck")) return originalFetch(pckUrl, ...args);
          if (url.endsWith("index.wasm"))
            return originalFetch(wasmUrl, ...args);
          return originalFetch(url, ...args);
        };

        const script = document.createElement("script");
        script.src = "index.js";

        script.onload = () => {
          const GODOT_CONFIG = {
            args: [],
            canvasResizePolicy: 2,
            executable: "index",
            experimentalVK: false,
            fileSizes: { "index.pck": 144830816, "index.wasm": 20112283 },
            focusCanvas: true,
            gdnativeLibs: [],
          };

          const engine = new Engine(GODOT_CONFIG);

          engine.startGame().then(() => {
            document.getElementById("status").style.display = "none";
          });
        };

        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
