<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toss The Turtle</title>
    <link rel="icon" type="image/x-icon" href="tosstheturtle.png" />
    <link rel="shortcut icon" type="image/x-icon" href="tosstheturtle.png" />
  </head>
  <body>
    <div id="ruffle" width="100%" height="100%"></div>
    <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.2.0-nightly.2026.3.28/ruffle.min.js"></script>
    <script>
      window.RufflePlayer = window.RufflePlayer || {};
      window.addEventListener("load", (event) => {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        const container = document.getElementById("ruffle");
        player.id = "player";
        player.style.width = "100%";
        player.style.height = "100%";
        player.style.border = "0";
        player.style.padding = "0";
        player.style.margin = "0";
        container.appendChild(player);
        player.load("tosstheturtle.swf");
      });
    </script>
  </body>
</html>
